<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Finalizar Cadastro</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f6f8;
            margin: 0;
        }

        .topo {
            background: #1976d2;
            color: white;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 20px;
            font-size: 20px;
        }

        .btn-voltar {
            background: white;
            color: #1976d2;
            padding: 6px 12px;
            border-radius: 4px;
            text-decoration: none;
            font-weight: bold;
            font-size: 13px;
        }

        .container {
            max-width: 900px;
            margin: 30px auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
        }

        h2 {
            border-bottom: 1px solid #ddd;
            padding-bottom: 5px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 15px;
        }

        label {
            font-weight: bold;
        }

        input, select {
            padding: 8px;
            width: 100%;
            font-size: 14px;
        }

        .acoes {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }

        button {
            padding: 8px 16px;
            font-size: 14px;
            background: #1976d2;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background: #125ea7;
        }
    </style>
</head>

<body>

<header class="topo">
    <a class="btn-voltar" href="usuarios.html">← Gestão de Usuários</a>
    <span>Finalizar Cadastro</span>
</header>

<div class="container">

    <!-- ================= USUÁRIO ================= -->
    <h2>Usuário (Acesso ao Sistema)</h2>

    <div class="grid">
        <div>
            <label>Email</label>
            <input id="emailUsuario" disabled>
        </div>

        <div>
            <label>Perfil do Usuário</label>
            <select id="perfilUsuario">
                <option value="MASTER">MASTER</option>
                <option value="SEDE">SEDE</option>
                <option value="FILIAL">FILIAL</option>
            </select>
        </div>
    </div>

    <div class="acoes">
        <button onclick="salvarUsuario()">Salvar Usuário</button>
        <button onclick="resetarSenha()">Resetar Senha</button>
    </div>

    <!-- ================= PESSOA ================= -->
    <h2 style="margin-top:40px;">Pessoa (Identidade Eclesiástica)</h2>

    <div class="grid">
        <div>
            <label>Nome Completo</label>
            <input id="nomePessoa">
        </div>

        <div>
            <label>Tipo da Pessoa</label>
            <select id="tipoPessoa">
                <option value="">Selecione</option>
                <option value="MEMBRO">MEMBRO</option>
                <option value="PASTOR">PASTOR</option>
                <option value="BISPO">BISPO</option>
                <option value="CLERO">CLERO</option>
                <option value="VISITANTE">VISITANTE</option>
            </select>
        </div>
    </div>

    <div class="acoes">
        <button onclick="salvarPessoa()">Salvar Pessoa</button>
    </div>

</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const usuarioId = params.get("id");

    if (!usuarioId) {
        alert("Usuário não informado");
    }

    // ---------- CARREGAR USUÁRIO ----------
    fetch(`/admin/usuarios/${usuarioId}`)
        .then(r => r.json())
        .then(u => {
            emailUsuario.value = u.email;
            perfilUsuario.value = u.perfil;
        });

    function salvarUsuario() {
        fetch(`/admin/usuarios/${usuarioId}`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                perfil: perfilUsuario.value,
                aprovado: true
            })
        }).then(() => alert("Usuário atualizado"));
    }

    function resetarSenha() {
        fetch(`/admin/usuarios/${usuarioId}/resetar-senha`, {
            method: "POST"
        }).then(() => alert("Senha resetada para 123456"));
    }

    function salvarPessoa() {
        fetch("/pessoas", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                nome: nomePessoa.value,
                tipo: tipoPessoa.value,
                ativo: true
            })
        }).then(() => alert("Pessoa salva"));
    }
</script>

</body>
</html>
