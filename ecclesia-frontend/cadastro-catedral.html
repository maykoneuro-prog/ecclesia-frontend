<script>
    const usuario = JSON.parse(localStorage.getItem("usuario"));
    if (!usuario) window.location.href = "login.html";
</script>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Catedral</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            margin: 0;
            font-size: 14px;
        }

        /* TOPO */
        .topo {
            background: #1976d2;
            color: white;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .btn-voltar {
            background: white;
            color: #1976d2;
            padding: 6px 12px;
            border-radius: 4px;
            text-decoration: none;
            font-weight: bold;
            font-size: 13px;
        }

        .btn-voltar:hover {
            background: #e3f2fd;
        }

        /* CARD */
        .card {
            background: white;
            max-width: 900px;
            margin: 30px auto;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        h2 {
            margin-top: 0;
        }

        label {
            font-weight: bold;
            display: block;
            margin-top: 14px;
        }

        input, select {
            width: 100%;
            padding: 7px;
            margin-top: 4px;
            font-size: 13px;
        }

        .linha {
            display: flex;
            gap: 15px;
        }

        .col {
            flex: 1;
        }

        .titulo-secao {
            margin-top: 25px;
            font-weight: bold;
            border-bottom: 1px solid #ddd;
            padding-bottom: 4px;
        }

        button {
            margin-top: 25px;
            width: 100%;
            padding: 10px;
            background: #1976d2;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
        }

        button:hover {
            background: #125ea7;
        }
    </style>
</head>

<body>

<!-- TOPO -->
<header class="topo">
    <a class="btn-voltar" href="home.html">← Voltar</a>
    <span>Cadastro de Catedral / Sede</span>
</header>

<!-- CONTEÚDO -->
<div class="card">

    <h2>Cadastro de Catedral</h2>

    <!-- DADOS PRINCIPAIS -->
    <label>Nome da Catedral</label>
    <input id="nome">

    <div class="linha">
        <div class="col">
            <label>CNPJ</label>
            <input id="cnpj">
        </div>

        <div class="col">
            <label>Status</label>
            <select id="ativa">
                <option value="true">Ativa</option>
                <option value="false">Inativa</option>
            </select>
        </div>
    </div>

    <!-- RESPONSÁVEL -->
    <label>Bispo Responsável</label>
    <select id="bispo">
        <option value="">Selecione</option>
    </select>

    <!-- ENDEREÇO -->
    <div class="titulo-secao">Endereço</div>

    <div class="linha">
        <div class="col">
            <label>CEP</label>
            <input id="cep">
        </div>

        <div class="col">
            <label>País</label>
            <input id="pais" value="Brasil">
        </div>
    </div>

    <label>Endereço</label>
    <input id="endereco">

    <div class="linha">
        <div class="col">
            <label>Número</label>
            <input id="numero">
        </div>

        <div class="col">
            <label>Complemento</label>
            <input id="complemento">
        </div>
    </div>

    <div class="linha">
        <div class="col">
            <label>Bairro</label>
            <input id="bairro">
        </div>

        <div class="col">
            <label>Cidade</label>
            <input id="cidade">
        </div>
    </div>

    <button onclick="salvar()">Salvar Catedral</button>
</div>

<script>
    function carregarBispos() {
        fetch("http://localhost:8080/pessoas")
            .then(r => r.json())
            .then(lista => {
                lista.forEach(p => {
                    const opt = document.createElement("option");
                    opt.value = p.id;
                    opt.textContent = p.nome;
                    bispo.appendChild(opt);
                });
            });
    }

    function salvar() {
        const igreja = {
            nome: nome.value,
            tipo: "SEDE",
            cnpj: cnpj.value,
            ativa: ativa.value === "true",
            responsavelId: bispo.value || null,
            cep: cep.value,
            pais: pais.value,
            endereco: endereco.value,
            numero: numero.value,
            complemento: complemento.value,
            bairro: bairro.value,
            cidade: cidade.value,
            igrejaPaiId: null
        };

        fetch("http://localhost:8080/igrejas", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(igreja)
        })
            .then(r => {
                if (!r.ok) throw new Error();
                alert("Catedral salva com sucesso!");
            })
            .catch(() => alert("Erro ao salvar catedral"));
    }

    carregarBispos();
</script>

</body>
</html>
