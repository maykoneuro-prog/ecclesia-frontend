<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Filial</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            margin: 0;
            font-size: 14px;
        }

        /* TOPO */
        .topo {
            background: #1976d2;
            color: white;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .btn-voltar {
            background: white;
            color: #1976d2;
            padding: 6px 12px;
            border-radius: 4px;
            text-decoration: none;
            font-weight: bold;
            font-size: 13px;
        }

        .btn-voltar:hover {
            background: #e3f2fd;
        }

        /* CARD */
        .card {
            background: white;
            max-width: 900px;
            margin: 30px auto;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        h2 {
            margin-top: 0;
        }

        label {
            font-weight: bold;
            display: block;
            margin-top: 14px;
        }

        input, select {
            width: 100%;
            padding: 7px;
            margin-top: 4px;
            font-size: 13px;
        }

        .linha {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .col {
            flex: 1;
            min-width: 200px;
        }

        .titulo-secao {
            margin-top: 25px;
            font-weight: bold;
            border-bottom: 1px solid #ddd;
            padding-bottom: 4px;
        }

        button {
            margin-top: 25px;
            width: 100%;
            padding: 10px;
            background: #1976d2;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
        }

        button:hover {
            background: #125ea7;
        }
    </style>
</head>

<body>

<header class="topo">
    <a class="btn-voltar" href="home.html">← Voltar</a>
    <span>Cadastro de Filial</span>
</header>

<div class="card">

    <h2>Cadastro de Filial</h2>

    <!-- DADOS PRINCIPAIS -->
    <label>Nome da Filial</label>
    <input id="nome">

    <div class="linha">
        <div class="col">
            <label>Tipo de Unidade</label>
            <select id="tipo">
                <option value="PAROQUIA">Paróquia</option>
                <option value="MISSAO">Missão</option>
                <option value="COMUNIDADE">Comunidade</option>
            </select>
        </div>

        <div class="col">
            <label>Status</label>
            <select id="ativa">
                <option value="true">Ativa</option>
                <option value="false">Inativa</option>
            </select>
        </div>
    </div>

    <!-- VINCULAÇÃO -->
    <label>Catedral (Sede)</label>
    <select id="catedral"></select>

    <label>Responsável da Filial</label>
    <select id="responsavel">
        <option value="">Selecione</option>
    </select>

    <!-- ENDEREÇO -->
    <div class="titulo-secao">Endereço</div>

    <div class="linha">
        <div class="col">
            <label>CEP</label>
            <input id="cep">
        </div>

        <div class="col">
            <label>País</label>
            <input id="pais" value="Brasil">
        </div>
    </div>

    <label>Endereço</label>
    <input id="endereco">

    <div class="linha">
        <div class="col">
            <label>Número</label>
            <input id="numero">
        </div>

        <div class="col">
            <label>Complemento</label>
            <input id="complemento">
        </div>
    </div>

    <div class="linha">
        <div class="col">
            <label>Bairro</label>
            <input id="bairro">
        </div>

        <div class="col">
            <label>Cidade</label>
            <input id="cidade">
        </div>
    </div>

    <button onclick="salvar()">Salvar Filial</button>
</div>

<script>
    function carregarCatedrais() {
        fetch("/igrejas")
            .then(r => r.json())
            .then(lista => {
                lista
                    .filter(i => i.tipo === "SEDE")
                    .forEach(i => {
                        const opt = document.createElement("option");
                        opt.value = i.id;
                        opt.textContent = i.nome;
                        catedral.appendChild(opt);
                    });
            });
    }

    function carregarResponsaveis() {
        fetch("/pessoas")
            .then(r => r.json())
            .then(lista => {
                lista.forEach(p => {
                    const opt = document.createElement("option");
                    opt.value = p.id;
                    opt.textContent = p.nome;
                    responsavel.appendChild(opt);
                });
            });
    }

    function salvar() {
        const filial = {
            nome: nome.value,
            tipo: tipo.value,
            ativa: ativa.value === "true",
            responsavelId: responsavel.value || null,
            cep: cep.value,
            pais: pais.value,
            endereco: endereco.value,
            numero: numero.value,
            complemento: complemento.value,
            bairro: bairro.value,
            cidade: cidade.value,
            igrejaPaiId: catedral.value
        };

        fetch("/igrejas", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(filial)
        })
            .then(r => {
                if (!r.ok) throw new Error();
                alert("Filial salva com sucesso!");
            })
            .catch(() => alert("Erro ao salvar filial"));
    }

    carregarCatedrais();
    carregarResponsaveis();
</script>

</body>
</html>
