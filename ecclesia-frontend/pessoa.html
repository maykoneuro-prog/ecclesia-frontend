<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Pessoa</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            margin: 0;
            font-size: 14px;
            min-height: 100vh;
        }

        /* TOPO */
        .topo {
            background: #1976d2;
            color: white;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .btn-voltar {
            background: white;
            color: #1976d2;
            padding: 6px 12px;
            border-radius: 4px;
            text-decoration: none;
            font-weight: bold;
            font-size: 13px;
            white-space: nowrap;
        }

        .btn-voltar:hover {
            background: #e3f2fd;
        }

        /* CARD */
        .card {
            background: white;
            max-width: 1000px;
            margin: 30px auto;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        h2 {
            margin-top: 0;
        }

        label {
            font-weight: bold;
            display: block;
            margin-top: 14px;
        }

        input, select {
            width: 100%;
            padding: 7px;
            margin-top: 4px;
            font-size: 13px;
        }

        .linha {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .col {
            flex: 1;
            min-width: 240px;
        }

        .col-foto {
            width: 260px;
        }

        .titulo-secao {
            margin-top: 32px;
            font-weight: bold;
            border-bottom: 1px solid #ddd;
            padding-bottom: 4px;
        }

        .foto-box {
            border: 1px dashed #ccc;
            padding: 15px;
            text-align: center;
            border-radius: 6px;
            margin-top: 4px;
        }

        .foto-box img {
            max-width: 100%;
            max-height: 220px;
            margin-top: 10px;
            border-radius: 4px;
        }

        button {
            margin-top: 30px;
            width: 100%;
            padding: 12px;
            background: #1976d2;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 15px;
            cursor: pointer;
        }

        button:hover {
            background: #125ea7;
        }
    </style>
</head>

<body>

<header class="topo">
    <a class="btn-voltar" href="home.html">⬅ Home</a>
    <span>Cadastro de Pessoa</span>
</header>

<div class="card">

    <h2>Cadastro de Pessoa</h2>

    <div class="linha">

        <div class="col">
            <label>Nome</label>
            <input id="nome">

            <div class="linha">
                <div class="col">
                    <label>CPF</label>
                    <input id="cpf">
                </div>

                <div class="col">
                    <label>Email</label>
                    <input id="email">
                </div>
            </div>

            <label>Telefone</label>
            <input id="telefone">

            <label>Igreja / Filial</label>
            <select id="igreja"></select>

            <div class="linha">
                <div class="col">
                    <label>Status</label>
                    <select id="ativo">
                        <option value="true">Ativo</option>
                        <option value="false">Inativo</option>
                    </select>
                </div>

                <div class="col">
                    <label>Data de Inativação</label>
                    <input type="date" id="dataInativacao">
                </div>
            </div>
        </div>

        <div class="col-foto">
            <label>Foto</label>
            <div class="foto-box">
                <input type="file" accept="image/*" onchange="mostrarFoto(event)">
                <img id="preview">
            </div>
        </div>

    </div>

    <div class="titulo-secao">Endereço</div>

    <div class="linha">
        <div class="col">
            <label>CEP</label>
            <input id="cep">
        </div>

        <div class="col">
            <label>País</label>
            <input id="pais" value="Brasil">
        </div>
    </div>

    <label>Endereço</label>
    <input id="endereco">

    <div class="linha">
        <div class="col">
            <label>Número</label>
            <input id="numero">
        </div>

        <div class="col">
            <label>Complemento</label>
            <input id="complemento">
        </div>
    </div>

    <div class="linha">
        <div class="col">
            <label>Bairro</label>
            <input id="bairro">
        </div>

        <div class="col">
            <label>Cidade</label>
            <input id="cidade">
        </div>
    </div>

    <button onclick="salvar()">Salvar Pessoa</button>
</div>

<script>
    let fotoBase64 = null;

    function mostrarFoto(event) {
        const file = event.target.files[0];
        const reader = new FileReader();
        reader.onload = () => {
            fotoBase64 = reader.result;
            preview.src = fotoBase64;
        };
        if (file) reader.readAsDataURL(file);
    }

    function carregarIgrejas() {
        fetch("/igrejas")
            .then(r => r.json())
            .then(lista => {
                lista.forEach(i => {
                    const o = document.createElement("option");
                    o.value = i.id;
                    o.textContent = i.nome;
                    igreja.appendChild(o);
                });
            });
    }

    function salvar() {
        const pessoa = {
            nome: nome.value,
            cpf: cpf.value,
            email: email.value,
            telefone: telefone.value,
            ativo: ativo.value === "true",
            dataInativacao: dataInativacao.value || null,
            foto: fotoBase64,
            igrejaId: igreja.value,
            cep: cep.value,
            pais: pais.value,
            endereco: endereco.value,
            numero: numero.value,
            complemento: complemento.value,
            bairro: bairro.value,
            cidade: cidade.value
        };

        fetch("/pessoas", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(pessoa)
        })
            .then(r => {
                if (!r.ok) throw new Error();
                alert("Pessoa salva com sucesso!");
            })
            .catch(() => alert("Erro ao salvar pessoa"));
    }

    carregarIgrejas();
</script>

</body>
</html>
