<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Gestão de Usuários</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f6f8;
            margin: 0;
        }

        .topo {
            background: #1976d2;
            color: white;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 20px;
            font-size: 20px;
        }

        .btn-voltar {
            background: white;
            color: #1976d2;
            padding: 6px 12px;
            border-radius: 4px;
            text-decoration: none;
            font-weight: bold;
            font-size: 13px;
        }

        .container {
            max-width: 1100px;
            margin: 30px auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
        }

        .busca {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        input {
            padding: 8px;
            flex: 1;
            font-size: 14px;
        }

        button {
            padding: 8px 16px;
            font-size: 14px;
            background: #1976d2;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background: #125ea7;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            border: 1px solid #ccc;
            padding: 10px;
            text-align: left;
        }

        tr:hover {
            background: #eef5ff;
            cursor: pointer;
        }
    </style>
</head>

<body>

<header class="topo">
    home.html← Home</a>
    <span>Gestão de Usuários</span>
</header>

<div class="container">

    <div class="busca">
        <input id="campoBusca" placeholder="Buscar por nome ou email">
        <button onclick="buscar()">Buscar</button>
    </div>

    <table>
        <thead>
        <tr>
            <th>Nome</th>
            <th>Email</th>
            <th>Perfil</th>
            <th>Aprovado</th>
        </tr>
        </thead>
        <tbody id="lista"></tbody>
    </table>
</div>

<script>
    function buscar() {
        const filtro = campoBusca.value || "";
        fetch(`/admin/usuarios?filtro=${encodeURIComponent(filtro)}`)
            .then(r => r.json())
            .then(preencherTabela);
    }

    function preencherTabela(usuarios) {
        const lista = document.getElementById("lista");
        lista.innerHTML = "";

        if (!usuarios || usuarios.length === 0) {
            lista.innerHTML = "<tr><td colspan='4'>Nenhum usuário encontrado</td></tr>";
            return;
        }

        usuarios.forEach(u => {
            const tr = document.createElement("tr");

            // ✅ DUPLO CLIQUE → FINALIZAR CADASTRO
            tr.ondblclick = () => {
                location.href = `finalizar-cadastro.html?id=${u.id}`;
            };

            tr.innerHTML = `
                <td>${u.nome || "-"}</td>
                <td>${u.email}</td>
                <td>${u.perfil || "-"}</td>
                <td>${u.aprovado ? "✅" : "❌"}</td>
            `;

            lista.appendChild(tr);
        });
    }

    // 🔍 carregamento inicial
    buscar();

    // ENTER para buscar
    campoBusca.addEventListener("keydown", e => {
        if (e.key === "Enter") buscar();
    });
</script>

</body>
</html>
